<body>

  <!-- HEADER BURAYA GELECEK -->

<section style="padding:40px;">

  <p>

  </p>
</section>

  <!-- FOOTER BURAYA GELECEK -->
  <div id="footer"></div>

  <!-- SCRIPT -->
  <script>
    fetch("components/header.html")

      .then(res => res.text())

      });
